<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Senha Alterada com Sucesso</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto&display=swap"
			rel="stylesheet"
		/>
		<style>
			body {
				font-family: 'Roboto', sans-serif;
				background-color: #f2f2f2;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				margin: 0;
			}

			.success-box {
				background-color: #fff;
				width: 360px;
				padding: 40px;
				border-radius: 8px;
				box-shadow: 0 1px 3px rgba(60, 64, 67, 0.3);
				text-align: center;
			}

			.logo {
				width: 75px;
				margin-bottom: 20px;
			}

			h2 {
				font-weight: normal;
				color: #202124;
				font-size: 24px;
			}

			p {
				font-size: 16px;
				color: #202124;
				margin-bottom: 20px;
			}

			button {
				background-color: #1a73e8;
				color: white;
				border: none;
				padding: 12px;
				font-size: 14px;
				border-radius: 4px;
				cursor: pointer;
				width: 100%;
			}

			button:hover {
				background-color: #0b57d0;
			}
		</style>
	</head>

	<body>
		<div class="success-box">
			<img
				class="logo"
				src="https://ssl.gstatic.com/accounts/ui/logo_2x.png"
				alt="Google"
			/>
			<h2>Senha alterada com sucesso!</h2>
			<p>Sua senha foi alterada com êxito. Agora você pode fechar essa aba.</p>
		</div>
	</body>
</html>
